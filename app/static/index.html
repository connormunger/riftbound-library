<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SC Riftbound</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/main.css">

</head>
<body>

  <!-- Top Navigation -->
  <nav class="topbar">
    <div class="brand">
      <div class="brand-icon">SC</div>
      Santa Cruz Riftbound Library
    </div>
    <button class="dev-toggle" onclick="toggleDevLogin()" id="login-btn">Dev: Simulate Login</button>
  </nav>

  <div class="app-shell">
    
    <!-- Sidebar -->
    <aside class="sidebar hidden" id="sidebar">
      <div style="padding: 0 16px 16px; color: var(--text-muted); font-size: 0.8rem; border-bottom: 1px solid var(--border); margin-bottom: 8px;">
        Logged in as <strong style="color:var(--text-main)" id="user-name">Guest</strong>
      </div>
      <button class="nav-btn active" onclick="switchView('search')" id="nav-search">
        Library Search
      </button>
      <button class="nav-btn" onclick="switchView('collection')" id="nav-collection">
         My Collection
      </button>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
      
      <!-- VIEW 1: Library Search -->
      <div id="view-search" class="view active">
        <div class="hero-container">
          <h1>Find a Card.</h1>
          <div class="search-wrapper">
            <input type="text" class="hero-input" id="search-input" placeholder="Search the library for any card..." oninput="filterTable()">
            <select class="hero-select" id="set-filter" onchange="filterTable()">
              <option value="ALL">All Sets</option>
            </select>
          </div>
        </div>

        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Card Name</th>
                <th>Set & Print</th>
                <th>Tags</th>
                <th>Owner</th>
                <th>Qty</th>
                <th>Market Price</th>
              </tr>
            </thead>
            <tbody id="inventory-tbody">
              <tr><td colspan="6" style="text-align:center; padding: 3rem; color: var(--text-muted);">Loading database...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- VIEW 2: My Collection -->
      <div id="view-collection" class="view">
        <h1 style="font-size: 2rem; margin-bottom: 2rem; font-weight: 600;">My Collection</h1>
        
        <div class="dashboard-grid">
          <div class="stat-card">
            <h3>Total Physical Cards</h3>
            <div class="value" id="stat-cards">--</div>
          </div>
          <div class="stat-card">
            <h3>Estimated Value</h3>
            <div class="value" id="stat-value">$0.00</div>
          </div>
        </div>

        <div class="import-card">
          <h3 style="color: var(--text-main); margin-bottom: 8px;">Import New Cards</h3>
          <p style="font-size: 0.9rem; margin-bottom: 16px;">This feature will allow you to quickly add cards to your personal inventory.</p>
          <button style="background: var(--accent); color: #000; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor:not-allowed; opacity: 0.5;">Coming Soon</button>
        </div>
      </div>

    </main>
  </div>

<script src="/static/js/app.js"></script>
<script src="/static/js/search.js"></script>
<script src="/static/js/collection.js"></script>
</body>
</html>
